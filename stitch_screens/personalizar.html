<header class="relative w-full h-64 md:h-96">

<img class="w-full h-full object-cover" data-alt="Close-up of a delicious Super Lonche Barbacoa. A crusty telera roll filled with tender, juicy shredded beef barbacoa, sliced avocado, and pickled red onions. Professional food photography in a bright, modern setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDB8P9K5Y1f7M0N-mSjW9J0U-V4f8zP8V6R9S2T5U7V-W9X1Y3Z5A7B9C1D3E5F7G9H1I3J5K7L9M1N3O5P7Q9R1S3T5U7V9W1X3Y5Z7A9B1C3D5E7F9G1"/>

<button class="w-10 h-10 rounded-full bg-surface/40 backdrop-blur-md flex items-center justify-center text-on-surface shadow-sm border border-white/20">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="px-margin-mobile md:px-margin-desktop py-6 pb-32 max-w-4xl mx-auto -mt-6 relative z-20 bg-background rounded-t-3xl md:rounded-t-none md:mt-0 shadow-[0px_-10px_30px_rgba(211,47,47,0.05)] md:shadow-none">
<!-- Product Header -->
<div class="flex justify-between items-start mb-2">
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Super Lonche Barbacoa</h1>
<span class="font-headline-md text-headline-md text-primary bg-primary-container/10 px-3 py-1 rounded-lg">$80.00</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 leading-relaxed">Tradicional lonche de barbacoa de res premium, servido en pan telera crujiente con aguacate, cebolla morada y nuestra salsa especial de la casa.</p>
<!-- Customization Sections -->
<div class="space-y-8">
<!-- Tortilla Type -->
<section>
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider mb-3">Tipo de Tortilla</h2>
<div class="flex gap-3">
<!-- Active Option (Corn Yellow) -->
<button class="flex-1 bg-secondary-container text-on-secondary-container border border-secondary-container rounded-lg py-3 px-4 font-label-md text-center transition-colors shadow-sm flex flex-col items-center gap-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
<span class="font-label-lg text-label-lg">Maíz</span>
</button>
<!-- Inactive Option -->
<button class="flex-1 bg-surface border border-outline-variant text-on-surface-variant rounded-lg py-3 px-4 text-center transition-colors hover:bg-surface-variant/50 flex flex-col items-center gap-1">
<span class="material-symbols-outlined">radio_button_unchecked</span>
<span class="font-label-lg text-label-lg">Harina</span>
</button>
</div>
</section>
<!-- Garnishes -->
<section>
<div class="flex justify-between items-end mb-3">
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Garnituras</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant">Selecciona a tu gusto</span>
</div>
<div class="flex flex-wrap gap-2">
<!-- Active Chip -->
<button class="bg-secondary-container text-on-secondary-container border border-secondary-container rounded-full py-2 px-5 flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined text-[18px]">check</span>
<span class="font-label-sm text-label-sm uppercase">Cebolla</span>
</button>
<!-- Active Chip -->
<button class="bg-secondary-container text-on-secondary-container border border-secondary-container rounded-full py-2 px-5 flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined text-[18px]">check</span>
<span class="font-label-sm text-label-sm uppercase">Cilantro</span>
</button>
<!-- Inactive Chip -->
<button class="bg-surface border border-outline-variant text-on-surface-variant rounded-full py-2 px-5 flex items-center gap-2 transition-colors hover:bg-surface-variant/50">
<span class="material-symbols-outlined text-[18px]">add</span>
<span class="font-label-sm text-label-sm uppercase">Piña Extra (+$5)</span>
</button>
</div>
</section>
<!-- Salsas -->
<section>
<div class="flex justify-between items-end mb-3">
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Salsas</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant">Incluidas a un lado</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Option 1 -->
<button class="bg-surface border border-outline-variant text-on-surface-variant rounded-xl p-3 flex flex-col items-center gap-2 transition-colors hover:bg-surface-variant/50">
<div class="w-8 h-8 rounded-full bg-red-600/20 flex items-center justify-center">
<span class="material-symbols-outlined text-red-600 text-[20px]">local_fire_department</span>
</div>
<span class="font-label-sm text-label-sm text-center">Roja<br/>(Picante)</span>
</button>
<!-- Option 2 (Active) -->
<button class="bg-secondary-container border border-secondary-container text-on-secondary-container rounded-xl p-3 flex flex-col items-center gap-2 transition-colors shadow-sm">
<div class="w-8 h-8 rounded-full bg-green-600/20 flex items-center justify-center">
<span class="material-symbols-outlined text-green-700 text-[20px]" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<span class="font-label-sm text-label-sm text-center font-bold">Verde<br/>(Suave)</span>
</button>
<!-- Option 3 -->
<button class="bg-surface border border-outline-variant text-on-surface-variant rounded-xl p-3 flex flex-col items-center gap-2 transition-colors hover:bg-surface-variant/50">
<div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-orange-600 text-[20px]">warning</span>
</div>
<span class="font-label-sm text-label-sm text-center">Habanero<br/>(Fuego)</span>
</button>
</div>
</section>

<section class="flex items-center justify-between py-4 border-t border-outline-variant/30 mt-6">
<h2 class="font-headline-md text-headline-md text-on-surface">Cantidad</h2>
<div class="flex items-center bg-surface-variant rounded-lg p-1">
<button class="w-10 h-10 flex items-center justify-center text-primary rounded-md active:bg-surface-container transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="w-12 text-center font-headline-md text-headline-md text-on-surface">1</span>
<button class="w-10 h-10 flex items-center justify-center text-primary bg-primary/10 rounded-md active:bg-primary/20 transition-colors">

</button>
</div>

<span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-wider">Añadir al carrito</span>
